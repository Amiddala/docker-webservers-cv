events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host:8444$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        location /cv1 {
            alias /usr/share/nginx/html/cv1/;
            index index.html;
            try_files $uri $uri/ /cv1/index.html;
        }

        location /cv2 {
            alias /usr/share/nginx/html/cv2/;
            index index.html;
            try_files $uri $uri/ /cv2/index.html;
        }

        location /cv3 {
            alias /usr/share/nginx/html/cv3/;
            index index.html;
            try_files $uri $uri/ /cv3/index.html;
        }
    }
}